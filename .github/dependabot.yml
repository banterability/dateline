version: 2
updates:
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: daily
      time: "11:00"
    open-pull-requests-limit: 10
    commit-message:
      prefix: "🤖 "
    cooldown:
      default-days: 3
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: daily
      time: "11:00"
    commit-message:
      prefix: "🤖 "
    cooldown:
      default-days: 3
